name: Bug Report
description: Report a bug in ChillHub
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting**, please search [existing issues](https://github.com/AppleChillVibez/ChillHub/issues) to avoid duplicates.
        If your bug already exists, give it a thumbs up (👍) instead of creating a new one.

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen recordings
      description: If applicable, add screenshots or recordings to help explain the problem.
    validations:
      required: false
